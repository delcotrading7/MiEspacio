/* ══════════════════════════════════════════════════════════════
   ESTADÍSTICAS FONDEO
══════════════════════════════════════════════════════════════ */
function getMonthKeys(y, m) {
  const total = new Date(y, m+1, 0).getDate();
  const keys = [];
  for (let d = 1; d <= total; d++) keys.push(mkKey(y, m, d));
  return keys;
}

function getWeekKeys(key) {
  const { y, m, d } = parseKey(key);
  const date = new Date(y, m, d);
  const dow  = date.getDay(); // 0=Dom
  const mondayOff = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(date);
  monday.setDate(date.getDate() + mondayOff);
  const keys = [];
  for (let i = 0; i < 7; i++) {
    const dd = new Date(monday);
    dd.setDate(monday.getDate() + i);
    keys.push(mkKey(dd.getFullYear(), dd.getMonth(), dd.getDate()));
  }
  return keys;
}

function calcStats(keys) {
  let tradesTotal=0, tpCount=0, beCount=0, slCount=0, totalPL=0;
  let tpDays=0, beDays=0, slDays=0;
  let bestKey=null, bestAmt=-Infinity, worstKey=null, worstAmt=Infinity;
  let tradingDays=0;

  keys.forEach(k => {
    const d = _fondeo[k];
    if (!d) return;
    const dr = getDayResult(d);
    if (!dr) return;
    tradingDays++;
    const st = getDayStats(d);
    tradesTotal += st.total;
    tpCount     += st.tp;
    beCount     += st.be;
    slCount     += st.sl;
    totalPL     += st.pl;
    if (dr==='tp') tpDays++;
    if (dr==='be') beDays++;
    if (dr==='sl') slDays++;
    if (st.pl > bestAmt)  { bestAmt=st.pl;  bestKey=k; }
    if (st.pl < worstAmt) { worstAmt=st.pl; worstKey=k; }
  });

  const wr = (tpDays+slDays) > 0 ? Math.round(tpDays/(tpDays+slDays)*100) : null;
  return { tradesTotal, tpCount, beCount, slCount, totalPL, tpDays, beDays, slDays, wr, bestKey, bestAmt, worstKey, worstAmt, tradingDays };
}

function renderStats() {
  renderDayStats();
  renderWeekStats();
  renderMonthStats();
}

function renderDayStats() {
  const card = document.getElementById('statDayCard');
  if (!card) return;
  const key = selectedFondeoKey;
  const d   = _fondeo[key] || {};
  const { y, m, day2 } = (() => { const p=parseKey(key); return {y:p.y,m:p.m,day2:p.d}; })();
  const p = parseKey(key);

  let html = '<div class="stat-card-title">📅 ' + p.d + ' de ' + MONTHS[p.m] + '</div>';

  const dr = getDayResult(d);
  const st = getDayStats(d);

  if (!dr) {
    html += '<div class="stat-empty">Sin datos — hacé click en el día para registrar</div>';
    card.innerHTML = html;
    return;
  }

  const ri = RES_INFO[dr];
  const drColor = dr==='tp'?'green':dr==='be'?'yellow':'red';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 10px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)">'+
    '<span style="font-size:20px">'+ri.emoji+'</span>'+
    '<span style="font-size:14px;font-weight:800;color:var(--'+drColor+')">'+ri.full+'</span>'+
  '</div>';

  html += '<div class="stat-pl-big" style="color:var(--'+(st.pl>0?'green':st.pl<0?'red':'yellow')+')">'+(st.pl>=0?'+':'')+st.pl.toLocaleString('es-AR')+'</div>';

  html += '<hr class="stat-divider">';
  if (st.total) html += '<div class="stat-row"><span class="stat-label">Trades totales</span><span class="stat-value">'+st.total+'</span></div>';
  if (st.tp)    html += '<div class="stat-row"><span class="stat-label">🟢 TP</span><span class="stat-value pos">'+st.tp+'</span></div>';
  if (st.be)    html += '<div class="stat-row"><span class="stat-label">🟡 BE</span><span class="stat-value neu">'+st.be+'</span></div>';
  if (st.sl)    html += '<div class="stat-row"><span class="stat-label">🔴 SL</span><span class="stat-value neg">'+st.sl+'</span></div>';

  card.innerHTML = html;
}

function renderWeekStats() {
  const card = document.getElementById('statWeekCard');
  if (!card) return;
  const weekKeys = getWeekKeys(selectedFondeoKey);
  const st = calcStats(weekKeys);

  const p1 = parseKey(weekKeys[0]);
  const p2 = parseKey(weekKeys[6]);
  const rangeStr = p1.d + ' ' + MONTHS[p1.m].slice(0,3) + ' – ' + p2.d + ' ' + MONTHS[p2.m].slice(0,3);

  let html = '<div class="stat-card-title">📊 ' + rangeStr + '</div>';

  if (st.tradingDays === 0) {
    html += '<div class="stat-empty">Sin datos esta semana</div>';
  } else {
    const plColor = st.totalPL>0?'green':st.totalPL<0?'red':'yellow';
    html += '<div class="stat-pl-big" style="color:var(--'+plColor+')">'+(st.totalPL>0?'+':'')+st.totalPL.toLocaleString('es-AR')+'</div>';
    html += '<hr class="stat-divider">';
    if (st.tradesTotal) html += '<div class="stat-row"><span class="stat-label">Trades</span><span class="stat-value">'+st.tradesTotal+'</span></div>';
    html += '<div class="stat-row"><span class="stat-label">Días</span><span class="stat-value"><span style="color:var(--green)">'+st.tpDays+' TP</span> · <span style="color:var(--yellow)">'+st.beDays+' BE</span> · <span style="color:var(--red)">'+st.slDays+' SL</span></span></div>';
    if (st.wr !== null) html += '<div class="stat-row"><span class="stat-label">Win Rate</span><span class="stat-value '+(st.wr>=50?'pos':'neg')+'">'+st.wr+'%</span></div>';
  }

  // Week dots (Mon–Dom)
  const WEEK_LBL = ['L','M','X','J','V','S','D'];
  html += '<div class="week-dots-wrap"><div class="week-dots">';
  weekKeys.forEach((k, i) => {
    const d  = _fondeo[k] || {};
    const dr = getDayResult(d);
    html += '<div class="wdot '+(dr||'')+'" title="'+WEEK_LBL[i]+': '+(dr?RES_INFO[dr].label:'—')+'"></div>';
  });
  html += '</div><div style="display:flex;gap:3px;margin-top:3px">';
  WEEK_LBL.forEach(l => {
    html += '<div style="flex:1;font-size:8px;color:var(--t3);text-align:center">'+l+'</div>';
  });
  html += '</div></div>';

  card.innerHTML = html;
}

function renderMonthStats() {
  const card = document.getElementById('statMonthCard');
  if (!card) return;
  const monthKeys = getMonthKeys(FS.y, FS.m);
  const st = calcStats(monthKeys);

  let html = '<div class="stat-card-title">📈 ' + MONTHS[FS.m] + ' ' + FS.y + '</div>';

  if (st.tradingDays === 0) {
    html += '<div class="stat-empty">Sin datos este mes</div>';
    card.innerHTML = html;
    return;
  }

  const plColor = st.totalPL>0?'green':st.totalPL<0?'red':'yellow';
  html += '<div class="stat-pl-big" style="color:var(--'+plColor+')">'+(st.totalPL>0?'+':'')+st.totalPL.toLocaleString('es-AR')+'</div>';

  if (st.wr !== null) {
    const wrC = st.wr>=50?'var(--green)':'var(--red)';
    html += '<div style="font-size:11px;color:var(--t2);margin-bottom:8px">Win Rate: <strong style="color:'+wrC+';font-size:14px">'+st.wr+'%</strong></div>';
  }

  html += '<hr class="stat-divider">';
  html += '<div class="stat-row"><span class="stat-label">Días operados</span><span class="stat-value">'+st.tradingDays+'</span></div>';
  if (st.tradesTotal) html += '<div class="stat-row"><span class="stat-label">Trades</span><span class="stat-value">'+st.tradesTotal+'</span></div>';
  html += '<div class="stat-row"><span class="stat-label">🟢 TP</span><span class="stat-value pos">'+st.tpDays+' días</span></div>';
  html += '<div class="stat-row"><span class="stat-label">🟡 BE</span><span class="stat-value neu">'+st.beDays+' días</span></div>';
  html += '<div class="stat-row"><span class="stat-label">🔴 SL</span><span class="stat-value neg">'+st.slDays+' días</span></div>';

  if (st.bestKey) {
    const bp = parseKey(st.bestKey);
    html += '<hr class="stat-divider"><div class="stat-row"><span class="stat-label">Mejor día</span><span class="stat-value pos">'+bp.d+'/'+String(bp.m+1).padStart(2,'0')+' +'+(st.bestAmt).toLocaleString('es-AR')+'</span></div>';
  }
  if (st.worstKey && st.worstAmt < 0) {
    const wp = parseKey(st.worstKey);
    html += '<div class="stat-row"><span class="stat-label">Peor día</span><span class="stat-value neg">'+wp.d+'/'+String(wp.m+1).padStart(2,'0')+' '+(st.worstAmt).toLocaleString('es-AR')+'</span></div>';
  }

  card.innerHTML = html;
}

      (st.worstKey && st.worstAmt < 0 ? '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--t2)">Peor día</span><span style="color:var(--red);font-weight:800">'+worstStr+'</span></div>' : '')+
    '</div>';
}

/* ══════════════════════════════════════════════════════════════
   IMAGE EDITOR — OBJECT BASED
   Each drawn element is a JS object; canvas is re-rendered from
   scratch each frame. Enables select / move / resize / delete.
══════════════════════════════════════════════════════════════ */
const IE = {
  tool:'pen', color:'#ff3b3b', width:2, opacity:0.20,

  // Object layer
  baseImage:null,     // HTMLImageElement — original, never modified
  objects:[],         // Array of drawing objects
  selectedIdx:null,   // Index of selected object or null
  dragState:null,     // { mode:'move'|'handle', handleIdx, lastX, lastY }

  // Live draw state (pen / eraser / highlight while dragging)
  drawing:false,
  livePoints:[],      // Points collected during current stroke
  liveBase:null,      // Canvas ImageData snapshot before highlight stroke
  startX:0, startY:0,// Drag-start for shapes

  // Path tool
  pathActive:false,   // Whether path-building mode is active

  // Undo/redo — JSON snapshots of IE.objects (lightweight, not pixel data)
  history:[], future:[], maxHistory:40,

  ctx:null, canvas:null,
  type:null, key:null, tradeId:null, idx:null,
  paused:false
};

/* ─── Rendering ─────────────────────────────────────────────── */

function ieRedraw() {
  const ctx = IE.ctx;
  ctx.clearRect(0, 0, IE.canvas.width, IE.canvas.height);
  if (IE.baseImage) ctx.drawImage(IE.baseImage, 0, 0);
  IE.objects.forEach(obj => ieDrawObj(ctx, obj));
  if (IE.selectedIdx !== null && IE.objects[IE.selectedIdx]) {
    ieDrawHandles(IE.objects[IE.selectedIdx]);
  }
}

function ieDrawObj(ctx, obj) {
  ctx.save();
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';

  if (obj.type === 'pen') {
    if (obj.points.length < 2) { ctx.restore(); return; }
    ctx.lineWidth = obj.width; ctx.strokeStyle = obj.color;
    ctx.beginPath();
    ctx.moveTo(obj.points[0].x, obj.points[0].y);
    for (let i = 1; i < obj.points.length; i++) ctx.lineTo(obj.points[i].x, obj.points[i].y);
    ctx.stroke();

  } else if (obj.type === 'eraser') {
    if (obj.points.length < 2) { ctx.restore(); return; }
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineWidth = obj.width * 5; ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.beginPath();
    ctx.moveTo(obj.points[0].x, obj.points[0].y);
    for (let i = 1; i < obj.points.length; i++) ctx.lineTo(obj.points[i].x, obj.points[i].y);
    ctx.stroke();

  } else if (obj.type === 'highlight') {
    if (obj.points.length < 2) { ctx.restore(); return; }
    const tmp = document.createElement('canvas');
    tmp.width = IE.canvas.width; tmp.height = IE.canvas.height;
    const tc = tmp.getContext('2d');
    tc.lineCap = 'round'; tc.lineJoin = 'round';
    tc.lineWidth = obj.width * 8; tc.strokeStyle = obj.color;
    tc.beginPath();
    tc.moveTo(obj.points[0].x, obj.points[0].y);
    for (let i = 1; i < obj.points.length; i++) tc.lineTo(obj.points[i].x, obj.points[i].y);
    tc.stroke();
    ctx.globalAlpha = obj.opacity || 0.20;
    ctx.drawImage(tmp, 0, 0);

  } else if (obj.type === 'line') {
    ctx.lineWidth = obj.width; ctx.strokeStyle = obj.color;
    ctx.beginPath(); ctx.moveTo(obj.x1, obj.y1); ctx.lineTo(obj.x2, obj.y2); ctx.stroke();

  } else if (obj.type === 'arrow') {
    ctx.lineWidth = obj.width; ctx.strokeStyle = obj.color;
    ieDrawArrow(ctx, obj.x1, obj.y1, obj.x2, obj.y2, obj.width, obj.color);

  } else if (obj.type === 'rect') {
    ctx.lineWidth = obj.width; ctx.strokeStyle = obj.color;
    ctx.strokeRect(obj.x1, obj.y1, obj.x2 - obj.x1, obj.y2 - obj.y1);

  } else if (obj.type === 'path') {
    if (!obj.points || obj.points.length < 1) { ctx.restore(); return; }
    ctx.lineWidth = obj.width; ctx.strokeStyle = obj.color;
    ctx.beginPath();
    ctx.moveTo(obj.points[0].x, obj.points[0].y);
    for (let i = 1; i < obj.points.length; i++) ctx.lineTo(obj.points[i].x, obj.points[i].y);
    ctx.stroke();
    if (obj.points.length >= 2) {
      const n = obj.points.length;
      ieDrawArrow(ctx, obj.points[n-2].x, obj.points[n-2].y, obj.points[n-1].x, obj.points[n-1].y, obj.width, obj.color);
    }
    ctx.beginPath();
    ctx.arc(obj.points[0].x, obj.points[0].y, Math.max(obj.width * 2, 4), 0, Math.PI*2);
    ctx.fillStyle = obj.color; ctx.fill();
  }
  ctx.restore();
}

function ieDrawArrow(ctx, x1, y1, x2, y2, w, color) {
  const ang = Math.atan2(y2 - y1, x2 - x1);
  const hw  = Math.max(w * 4, 10);
  ctx.globalCompositeOperation = 'source-over';
  ctx.strokeStyle = color; ctx.lineWidth = w;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hw * Math.cos(ang - Math.PI/6), y2 - hw * Math.sin(ang - Math.PI/6));
  ctx.lineTo(x2 - hw * Math.cos(ang + Math.PI/6), y2 - hw * Math.sin(ang + Math.PI/6));
  ctx.closePath(); ctx.fillStyle = color; ctx.fill();
}

/* ─── Hit Testing ───────────────────────────────────────────── */

function ieHit(obj, x, y) {
  const T = 12;
  if (obj.type === 'pen' || obj.type === 'eraser' || obj.type === 'path') {
    return ieHitPoly(obj.points, x, y, Math.max(obj.width, T));
  }
  if (obj.type === 'highlight') {
    return ieHitPoly(obj.points, x, y, Math.max(obj.width * 4, T));
  }
  if (obj.type === 'line' || obj.type === 'arrow') {
    return ieDistSeg(x, y, obj.x1, obj.y1, obj.x2, obj.y2) < Math.max(obj.width + 2, T);
  }
  if (obj.type === 'rect') {
    const x1=Math.min(obj.x1,obj.x2), x2=Math.max(obj.x1,obj.x2);
    const y1=Math.min(obj.y1,obj.y2), y2=Math.max(obj.y1,obj.y2);
    return x>=x1-T && x<=x2+T && y>=y1-T && y<=y2+T &&
           (x<=x1+T || x>=x2-T || y<=y1+T || y>=y2-T);
  }
  return false;
}

function ieHitPoly(pts, x, y, tol) {
  if (!pts) return false;
  for (let i = 0; i < pts.length - 1; i++) {
    if (ieDistSeg(x, y, pts[i].x, pts[i].y, pts[i+1].x, pts[i+1].y) < tol) return true;
  }
  return false;
}

function ieDistSeg(px, py, ax, ay, bx, by) {
  const dx=bx-ax, dy=by-ay, len2=dx*dx+dy*dy;
  if (!len2) return Math.hypot(px-ax, py-ay);
  const t = Math.max(0, Math.min(1, ((px-ax)*dx+(py-ay)*dy)/len2));
  return Math.hypot(px-(ax+t*dx), py-(ay+t*dy));
}

/* ─── Bounding Box & Handles ────────────────────────────────── */

function ieBBox(obj) {
  let xs, ys;
  if (obj.points) { xs=obj.points.map(p=>p.x); ys=obj.points.map(p=>p.y); }
  else            { xs=[obj.x1,obj.x2]; ys=[obj.y1,obj.y2]; }
  const x1=Math.min(...xs), x2=Math.max(...xs), y1=Math.min(...ys), y2=Math.max(...ys);
  return {x:x1, y:y1, w:x2-x1, h:y2-y1};
}

function ieGetHandles(obj) {
  if (obj.type==='line'||obj.type==='arrow') return [{x:obj.x1,y:obj.y1},{x:obj.x2,y:obj.y2}];
  if (obj.type==='rect') return [{x:obj.x1,y:obj.y1},{x:obj.x2,y:obj.y1},{x:obj.x2,y:obj.y2},{x:obj.x1,y:obj.y2}];
  return [];
}

function ieHandleAt(obj, x, y) {
  const H=9, hs=ieGetHandles(obj);
  for (let i=0;i<hs.length;i++) if (Math.abs(hs[i].x-x)<H&&Math.abs(hs[i].y-y)<H) return i;
  return -1;
}

function ieDrawHandles(obj) {
  const ctx=IE.ctx, bb=ieBBox(obj), P=10;
  ctx.save();
  ctx.strokeStyle='#3da8ff'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
  ctx.strokeRect(bb.x-P, bb.y-P, bb.w+P*2, bb.h+P*2);
  ctx.setLineDash([]);
  ieGetHandles(obj).forEach(h => {
    ctx.fillStyle='#fff'; ctx.strokeStyle='#3da8ff'; ctx.lineWidth=1.5;
    ctx.fillRect(h.x-5,h.y-5,10,10); ctx.strokeRect(h.x-5,h.y-5,10,10);
  });
  ctx.restore();
}

function ieApplyHandle(obj, hi, nx, ny) {
  if (obj.type==='line'||obj.type==='arrow') {
    if(hi===0){obj.x1=nx;obj.y1=ny;}else{obj.x2=nx;obj.y2=ny;}
  } else if (obj.type==='rect') {
    if(hi===0){obj.x1=nx;obj.y1=ny;}
    else if(hi===1){obj.x2=nx;obj.y1=ny;}
    else if(hi===2){obj.x2=nx;obj.y2=ny;}
    else          {obj.x1=nx;obj.y2=ny;}
  }
}

function ieTranslate(obj, dx, dy) {
  if (obj.points) { obj.points=obj.points.map(p=>({x:p.x+dx,y:p.y+dy})); }
  else { obj.x1+=dx; obj.y1+=dy; obj.x2+=dx; obj.y2+=dy; }
}

/* ─── Undo / Redo (JSON snapshots, not pixel data) ─────────── */

function saveEditorState() {
  IE.history.push(JSON.stringify(IE.objects));
  if (IE.history.length > IE.maxHistory) IE.history.shift();
  IE.future = [];
}

function editorUndo() {
  if (IE.history.length <= 1) return;
  IE.future.push(IE.history.pop());
  IE.objects = JSON.parse(IE.history[IE.history.length - 1]);
  IE.selectedIdx = null; ieRedraw();
}

function editorRedo() {
  if (!IE.future.length) return;
  IE.history.push(IE.future.pop());
  IE.objects = JSON.parse(IE.history[IE.history.length - 1]);
  IE.selectedIdx = null; ieRedraw();
}

function editorClearAll() {
  if (!confirm('¿Limpiar todos los dibujos?')) return;
  IE.objects = []; IE.selectedIdx = null; IE.future = [];
  saveEditorState(); ieRedraw();
}

/* ─── Photo Object Accessors ────────────────────────────────── */

function ieGetPhoto() {
  const {type, key, tradeId, idx} = IE;
  if (type==='pCtx') { const td=getDay(key).trades.find(t=>t.id===tradeId); return td?(Array.isArray(td.context)?td.context:[])[idx]:null; }
  if (type==='pPh')  { const td=getDay(key).trades.find(t=>t.id===tradeId); return td?td.photos[idx]:null; }
  if (type==='fCtx') return (getDayFondeo(key).contextPhotos||[])[idx];
  if (type==='fPh')  return (getDayFondeo(key).photos||[])[idx];
  return null;
}

function ieIdbKey() {
  const {type, key, tradeId, idx} = IE;
  if (type==='pCtx') return key+'_ctx_'+tradeId+'_'+idx;
  if (type==='pPh')  return key+'_ph_' +tradeId+'_'+idx;
  if (type==='fCtx') return 'f_'+key+'_ctx_'+idx;
  if (type==='fPh')  return 'f_'+key+'_ph_'+idx;
  return '';
}

/* ─── Open / Close / Save ───────────────────────────────────── */

function openImgEditor(evt, type, key, tradeId, idx) {
  evt.stopPropagation();
  IE.type=type; IE.key=key; IE.tradeId=tradeId; IE.idx=idx;
  IE.pathActive=false; IE.selectedIdx=null; IE.drawing=false; IE.dragState=null;
  updatePathUI();

  const photo = ieGetPhoto();
  const src   = photo && (photo.base || photo.data);
  if (!src) return;

  const img = new Image();
  img.onload = () => {
    IE.canvas.width  = img.naturalWidth;
    IE.canvas.height = img.naturalHeight;
    IE.baseImage = img;
    IE.objects   = photo.annotations ? JSON.parse(JSON.stringify(photo.annotations)) : [];
    IE.history   = []; IE.future = [];
    saveEditorState(); ieRedraw();
    document.getElementById('imgEditorOverlay').classList.add('open');
  };
  img.src = src;
}

function closeImgEditor() {
  IE.pathActive=false; IE.selectedIdx=null; _iePath=null;
  updatePathUI();
  _clearEditorNav();
  document.getElementById('imgEditorOverlay').classList.remove('open');
  IE.type=IE.key=IE.tradeId=IE.idx=null;
  IE.paused=false;
}

/* ─── Editor ↔ Context navigation ──────────────────────────── */

function _clearEditorNav() {
  // Hide all editor-return buttons (Práctica + Fondeo)
  document.querySelectorAll('.ctx-editor-ret-btn').forEach(b => b.classList.remove('visible'));
}

function ieGoToCtx() {
  if (!IE.type) return;
  const { type, key, tradeId } = IE;

  // Pause the editor: hide overlay without destroying state
  document.getElementById('imgEditorOverlay').classList.remove('open');
  IE.paused = true;

  if (type === 'pPh' || type === 'pCtx') {
    // Práctica — scroll to ctx-sec-{tradeId} on the background page
    const bodyEl = document.getElementById('ab-' + tradeId);
    const wasOpen = bodyEl && bodyEl.classList.contains('open');
    if (!wasOpen) toggleAcc(tradeId);
    setTimeout(() => {
      const ctxSec = document.getElementById('ctx-sec-' + tradeId);
      if (!ctxSec) return;
      ctxSec.scrollIntoView({ behavior:'smooth', block:'center' });
      ctxSec.classList.remove('nav-flash-gold');
      void ctxSec.offsetWidth;
      ctxSec.classList.add('nav-flash-gold');
      ctxSec.addEventListener('animationend', () => ctxSec.classList.remove('nav-flash-gold'), { once:true });
      const btn = document.getElementById('ctx-edr-' + tradeId);
      if (btn) btn.classList.add('visible');
    }, wasOpen ? 60 : 300);
  } else {
    // Fondeo — scroll within fondeo modal to context section
    setTimeout(() => {
      const ctxSec = document.getElementById('f-ctx-sec-' + key);
      if (!ctxSec) return;
      ctxSec.scrollIntoView({ behavior:'smooth', block:'nearest' });
      ctxSec.classList.remove('nav-flash-gold');
      void ctxSec.offsetWidth;
      ctxSec.classList.add('nav-flash-gold');
      ctxSec.addEventListener('animationend', () => ctxSec.classList.remove('nav-flash-gold'), { once:true });
      const btn = document.getElementById('f-ctx-editor-ret-btn');
      if (btn) btn.classList.add('visible');
    }, 60);
  }
}

function ieReturnFromCtx() {
  if (!IE.paused) return;
  _clearEditorNav();
  IE.paused = false;
  document.getElementById('imgEditorOverlay').classList.add('open');
}

function saveEditorChanges() {
  const photo = ieGetPhoto();
  if (!photo) { closeImgEditor(); return; }
  if (!photo.base) photo.base = photo.data; // preserve original for future re-edits

  // Flatten to PNG for display / thumbnails
  const flat = document.createElement('canvas');
  flat.width=IE.canvas.width; flat.height=IE.canvas.height;
  const fc = flat.getContext('2d');
  if (IE.baseImage) fc.drawImage(IE.baseImage, 0, 0);
  IE.objects.forEach(obj => ieDrawObj(fc, obj));
  const dataURL = flat.toDataURL('image/png');

  photo.data        = dataURL;
  photo.annotations = JSON.parse(JSON.stringify(IE.objects));
  idbSave(ieIdbKey(), dataURL);

  const {type, key} = IE;
  if (type==='pCtx'||type==='pPh') { saveData(); renderDay(key); }
  else { saveFondeoData(); if (currentFondeoKey===key) renderFondeoModalBody(key); }
  closeImgEditor();
}

/* ─── UI Helpers ────────────────────────────────────────────── */

function getCanvasPos(evt) {
  const r=IE.canvas.getBoundingClientRect();
  const sx=IE.canvas.width/r.width, sy=IE.canvas.height/r.height;
  const cx=evt.touches?evt.touches[0].clientX:evt.clientX;
  const cy=evt.touches?evt.touches[0].clientY:evt.clientY;
  return {x:(cx-r.left)*sx, y:(cy-r.top)*sy};
}

function updatePathUI() {
  const a=IE.pathActive;
  document.getElementById('iePathHint').classList.toggle('visible',a);
  document.getElementById('iePathFinish').classList.toggle('visible',a);
  document.getElementById('iePathCancel').classList.toggle('visible',a);
}

/* ─── Path Tool ─────────────────────────────────────────────── */
let _iePath = null; // path object being built

function cancelPath() {
  IE.pathActive=false; _iePath=null; ieRedraw(); updatePathUI();
}

function finishPath() {
  if (!IE.pathActive || !_iePath || _iePath.points.length < 2) { cancelPath(); return; }
  IE.objects.push(_iePath);
  IE.pathActive=false; _iePath=null;
  saveEditorState(); ieRedraw(); updatePathUI();
}

/* ─── Tools ─────────────────────────────────────────────────── */

function setEditorTool(tool) {
  if (IE.pathActive) cancelPath();
  IE.selectedIdx = null;
  IE.tool = tool;
  document.querySelectorAll('.ie-tool').forEach(b=>b.classList.toggle('active',b.dataset.tool===tool));
  const isHL = tool==='highlight';
  document.getElementById('ieOpacityLbl').style.display = isHL?'':'none';
  document.getElementById('ieOpacity').style.display    = isHL?'':'none';
  IE.canvas.style.cursor = 'crosshair';
  updatePathUI(); ieRedraw();
}

function setEditorColor(color) {
  IE.color=color;
  document.querySelectorAll('.ie-color-btn').forEach(b=>b.classList.toggle('active',b.dataset.color===color));
}

function setEditorWidth(w) {
  IE.width=w;
  document.querySelectorAll('.ie-width-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.w)===w));
}

/* ─── initEditorUI ──────────────────────────────────────────── */

function initEditorUI() {
  IE.canvas = document.getElementById('editorCanvas');
  IE.ctx    = IE.canvas.getContext('2d');
  initEditorEvents();

  document.querySelectorAll('.ie-tool[data-tool]').forEach(btn=>{
    btn.addEventListener('click',()=>setEditorTool(btn.dataset.tool));
  });
  document.getElementById('ieColors').addEventListener('click',e=>{
    const b=e.target.closest('.ie-color-btn'); if(b) setEditorColor(b.dataset.color);
  });
  document.getElementById('ieWidths').addEventListener('click',e=>{
    const b=e.target.closest('.ie-width-btn'); if(b) setEditorWidth(parseInt(b.dataset.w));
  });
  document.getElementById('ieOpacity').addEventListener('input',e=>{ IE.opacity=parseInt(e.target.value)/100; });
  document.getElementById('iePathFinish').addEventListener('click', finishPath);
  document.getElementById('iePathCancel').addEventListener('click', cancelPath);

  document.addEventListener('keydown', e => {
    if (!document.getElementById('imgEditorOverlay').classList.contains('open')) return;
    if (e.key==='s'&&!e.ctrlKey&&!e.metaKey&&!e.target.matches('input,textarea')) { setEditorTool('select'); return; }
    if ((e.key==='Delete'||e.key==='Backspace') && IE.selectedIdx!==null && !e.target.matches('input,textarea')) {
      e.preventDefault();
      IE.objects.splice(IE.selectedIdx,1); IE.selectedIdx=null; saveEditorState(); ieRedraw();
      return;
    }
    if (e.key==='Escape')  { e.preventDefault(); IE.pathActive?cancelPath():closeImgEditor(); return; }
    if (e.key==='Enter' && IE.pathActive) { e.preventDefault(); finishPath(); return; }
    if ((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey) { e.preventDefault(); editorUndo(); return; }
    if ((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))) { e.preventDefault(); editorRedo(); return; }
  });

  document.getElementById('ieUndo').addEventListener('click',   editorUndo);
  document.getElementById('ieRedo').addEventListener('click',   editorRedo);
  document.getElementById('ieClear').addEventListener('click',  editorClearAll);
  document.getElementById('ieSave').addEventListener('click',   saveEditorChanges);
  document.getElementById('ieClose').addEventListener('click',  closeImgEditor);
  document.getElementById('ieCtxBtn').addEventListener('click', ieGoToCtx);
}

/* ─── initEditorEvents ──────────────────────────────────────── */

function initEditorEvents() {
  const cv = IE.canvas;

  function start(evt) {
    evt.preventDefault();
    const pos = getCanvasPos(evt);

    /* ── SELECT ──────────────────────────────────────────── */
    if (IE.tool === 'select') {
      if (IE.selectedIdx !== null) {
        const obj = IE.objects[IE.selectedIdx];
        const hi  = obj ? ieHandleAt(obj, pos.x, pos.y) : -1;
        if (hi >= 0) { IE.dragState={mode:'handle',handleIdx:hi,lastX:pos.x,lastY:pos.y}; return; }
        if (obj && ieHit(obj, pos.x, pos.y)) { IE.dragState={mode:'move',lastX:pos.x,lastY:pos.y}; return; }
      }
      let found = -1;
      for (let i=IE.objects.length-1;i>=0;i--) { if (ieHit(IE.objects[i],pos.x,pos.y)){found=i;break;} }
      IE.selectedIdx = found;
      IE.dragState   = found>=0 ? {mode:'move',lastX:pos.x,lastY:pos.y} : null;
      ieRedraw(); return;
    }

    /* ── PATH (click-based, not drag) ────────────────────── */
    if (IE.tool === 'path') return;

    /* ── HIGHLIGHT ───────────────────────────────────────── */
    if (IE.tool === 'highlight') {
      IE.drawing=true; IE.livePoints=[pos];
      IE.liveBase=IE.ctx.getImageData(0,0,cv.width,cv.height); return;
    }

    /* ── PEN / ERASER ────────────────────────────────────── */
    if (IE.tool==='pen'||IE.tool==='eraser') {
      IE.drawing=true; IE.livePoints=[pos]; return;
    }

    /* ── SHAPES ──────────────────────────────────────────── */
    IE.drawing=true; IE.startX=pos.x; IE.startY=pos.y;
  }

  function move(evt) {
    evt.preventDefault();
    const pos = getCanvasPos(evt);

    /* ── SELECT drag / hover ─────────────────────────────── */
    if (IE.tool === 'select') {
      if (IE.dragState && IE.selectedIdx!==null) {
        const dx=pos.x-IE.dragState.lastX, dy=pos.y-IE.dragState.lastY;
        IE.dragState.lastX=pos.x; IE.dragState.lastY=pos.y;
        const obj=IE.objects[IE.selectedIdx];
        if (IE.dragState.mode==='move') ieTranslate(obj,dx,dy);
        else ieApplyHandle(obj,IE.dragState.handleIdx,pos.x,pos.y);
        ieRedraw(); return;
      }
      // Update cursor on hover
      let hov=false;
      for (let i=IE.objects.length-1;i>=0;i--) { if(ieHit(IE.objects[i],pos.x,pos.y)){hov=true;break;} }
      cv.style.cursor=hov?'move':'crosshair';
      if (IE.selectedIdx!==null&&IE.objects[IE.selectedIdx]) {
        if (ieHandleAt(IE.objects[IE.selectedIdx],pos.x,pos.y)>=0) cv.style.cursor='nwse-resize';
      }
      return;
    }

    /* ── PATH preview ────────────────────────────────────── */
    if (IE.tool==='path') {
      if (!IE.pathActive||!_iePath) return;
      ieRedraw();
      const ctx=IE.ctx, pts=_iePath.points;
      ctx.save();
      ctx.globalCompositeOperation='source-over';
      ctx.lineWidth=_iePath.width; ctx.strokeStyle=_iePath.color;
      ctx.lineCap='round'; ctx.lineJoin='round'; ctx.globalAlpha=1;
      if (pts.length>=2) {
        ctx.setLineDash([]);
        ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
        for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
        ctx.stroke();
      }
      const r=Math.max(_iePath.width*2,4);
      pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fillStyle=_iePath.color;ctx.fill();});
      if (pts.length>=1) {
        const last=pts[pts.length-1];
        ctx.setLineDash([5,6]); ctx.globalAlpha=0.5;
        ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(pos.x,pos.y); ctx.stroke();
      }
      ctx.restore(); return;
    }

    if (!IE.drawing) return;

    /* ── HIGHLIGHT live ──────────────────────────────────── */
    if (IE.tool==='highlight') {
      IE.livePoints.push(pos);
      IE.ctx.putImageData(IE.liveBase,0,0);
      _ieDrawHL(IE.livePoints, IE.color, IE.width, IE.opacity); return;
    }

    /* ── PEN / ERASER live ───────────────────────────────── */
    if (IE.tool==='pen'||IE.tool==='eraser') {
      const pts=IE.livePoints, n=pts.length;
      if (n<1) return;
      IE.livePoints.push(pos);
      const ctx=IE.ctx;
      ctx.save();
      ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.globalCompositeOperation=IE.tool==='eraser'?'destination-out':'source-over';
      ctx.lineWidth=IE.tool==='eraser'?IE.width*5:IE.width;
      ctx.strokeStyle=IE.tool==='eraser'?'rgba(0,0,0,1)':IE.color;
      ctx.beginPath(); ctx.moveTo(pts[n-1].x,pts[n-1].y); ctx.lineTo(pos.x,pos.y); ctx.stroke();
      ctx.restore(); return;
    }

    /* ── SHAPES live preview ─────────────────────────────── */
    ieRedraw();
    const ctx=IE.ctx;
    ctx.save(); ctx.globalCompositeOperation='source-over';
    ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.lineWidth=IE.width; ctx.strokeStyle=IE.color;
    if (IE.tool==='line')  { ctx.beginPath();ctx.moveTo(IE.startX,IE.startY);ctx.lineTo(pos.x,pos.y);ctx.stroke(); }
    else if (IE.tool==='arrow') { ieDrawArrow(ctx,IE.startX,IE.startY,pos.x,pos.y,IE.width,IE.color); }
    else if (IE.tool==='rect')  { ctx.strokeRect(IE.startX,IE.startY,pos.x-IE.startX,pos.y-IE.startY); }
    ctx.restore();
  }

  function end(evt) {
    /* ── SELECT ──────────────────────────────────────────── */
    if (IE.tool==='select') {
      if (IE.dragState) { IE.dragState=null; saveEditorState(); ieRedraw(); } return;
    }
    if (IE.tool==='path') return;
    if (!IE.drawing) return;
    IE.drawing=false;

    const pos = evt.changedTouches
      ? {x:(evt.changedTouches[0].clientX-cv.getBoundingClientRect().left)*(cv.width/cv.getBoundingClientRect().width),
         y:(evt.changedTouches[0].clientY-cv.getBoundingClientRect().top) *(cv.height/cv.getBoundingClientRect().height)}
      : getCanvasPos(evt);

    /* ── HIGHLIGHT ───────────────────────────────────────── */
    if (IE.tool==='highlight') {
      if (IE.livePoints.length>=2)
        IE.objects.push({type:'highlight',color:IE.color,width:IE.width,opacity:IE.opacity,points:[...IE.livePoints]});
      IE.livePoints=[]; IE.liveBase=null; saveEditorState(); ieRedraw(); return;
    }

    /* ── PEN / ERASER ────────────────────────────────────── */
    if (IE.tool==='pen'||IE.tool==='eraser') {
      if (IE.livePoints.length>=2)
        IE.objects.push({type:IE.tool,color:IE.color,width:IE.width,points:[...IE.livePoints]});
      IE.livePoints=[]; saveEditorState(); ieRedraw(); return;
    }

    /* ── SHAPES ──────────────────────────────────────────── */
    const dx=Math.abs(pos.x-IE.startX), dy=Math.abs(pos.y-IE.startY);
    if (dx<3&&dy<3) { ieRedraw(); return; }
    if (IE.tool==='line')  IE.objects.push({type:'line', color:IE.color,width:IE.width,x1:IE.startX,y1:IE.startY,x2:pos.x,y2:pos.y});
    else if(IE.tool==='arrow') IE.objects.push({type:'arrow',color:IE.color,width:IE.width,x1:IE.startX,y1:IE.startY,x2:pos.x,y2:pos.y});
    else if(IE.tool==='rect')  IE.objects.push({type:'rect', color:IE.color,width:IE.width,x1:IE.startX,y1:IE.startY,x2:pos.x,y2:pos.y});
    saveEditorState(); ieRedraw();
  }

  /* Path — click-based with dblclick to finish */
  let _pt = null;
  cv.addEventListener('click', evt => {
    if (IE.tool!=='path') return;
    if (_pt!==null) return; // absorb 2nd click of dblclick
    _pt = setTimeout(()=>{
      _pt=null;
      const pos=getCanvasPos(evt);
      if (!IE.pathActive) {
        IE.pathActive=true;
        _iePath={type:'path',color:IE.color,width:IE.width,points:[pos]};
        updatePathUI();
      } else {
        _iePath.points.push(pos);
        _iePath.color=IE.color; _iePath.width=IE.width;
        ieRedraw(); ieDrawObj(IE.ctx,_iePath);
      }
    }, 220);
  });
  cv.addEventListener('dblclick', evt=>{
    if (IE.tool!=='path') return;
    if (_pt!==null){clearTimeout(_pt);_pt=null;}
    finishPath();
  });

  cv.addEventListener('mousedown',  start, {passive:false});
  cv.addEventListener('mousemove',  move,  {passive:false});
  cv.addEventListener('mouseup',    end,   {passive:false});
  cv.addEventListener('mouseleave', evt=>{ if(IE.tool!=='select'&&IE.drawing) end(evt); }, {passive:false});
  cv.addEventListener('touchstart', start, {passive:false});
  cv.addEventListener('touchmove',  move,  {passive:false});
  cv.addEventListener('touchend',   end,   {passive:false});
}

function _ieDrawHL(points, color, width, opacity) {
  if (points.length<2) return;
  const tmp=document.createElement('canvas');
  tmp.width=IE.canvas.width; tmp.height=IE.canvas.height;
  const tc=tmp.getContext('2d');
  tc.lineCap='round'; tc.lineJoin='round'; tc.lineWidth=width*8; tc.strokeStyle=color;
  tc.beginPath(); tc.moveTo(points[0].x,points[0].y);
  for(let i=1;i<points.length;i++) tc.lineTo(points[i].x,points[i].y);
  tc.stroke();
  IE.ctx.save();
  IE.ctx.globalCompositeOperation='source-over'; IE.ctx.globalAlpha=opacity;
  IE.ctx.drawImage(tmp,0,0); IE.ctx.restore();
}

/* ══════════════════════════════════════════════════════════════
   BI-DIRECTIONAL NAVIGATION  (Práctica captures ↔ context)
   _navRef tracks the source capture so "Volver" knows where to go.
══════════════════════════════════════════════════════════════ */
let _navRef = null; // { tradeId, photoIdx }

function goToContext(evt, key, tradeId, photoIdx) {
  evt.stopPropagation();

  // Deactivate any previous return button
  if (_navRef) _setReturnBtn(_navRef.tradeId, false);

  _navRef = { tradeId, photoIdx };

  // Open accordion if closed (e.g. navigated from summary)
  const bodyEl = document.getElementById('ab-' + tradeId);
  const wasOpen = bodyEl && bodyEl.classList.contains('open');
  if (!wasOpen) toggleAcc(tradeId);

  // Scroll to context section after accordion opens (CSS transition ~220ms)
  const delay = wasOpen ? 50 : 280;
  setTimeout(() => {
    const ctxSec = document.getElementById('ctx-sec-' + tradeId);
    if (!ctxSec) return;
    ctxSec.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // Flash gold to signal "now type here"
    ctxSec.classList.remove('nav-flash-gold');
    void ctxSec.offsetWidth; // force reflow so animation restarts
    ctxSec.classList.add('nav-flash-gold');
    ctxSec.addEventListener('animationend', () => ctxSec.classList.remove('nav-flash-gold'), { once: true });
    // Show the return button for this trade
    _setReturnBtn(tradeId, true);
  }, delay);
}

function goToCapture() {
  if (!_navRef) return;
  const { tradeId, photoIdx } = _navRef;

  const thumb = document.getElementById('pth-' + tradeId + '-' + photoIdx);
  if (!thumb) { _navRef = null; return; } // trade was deleted or re-rendered

  // Scroll to the capture thumbnail
  thumb.scrollIntoView({ behavior: 'smooth', block: 'center' });

  // Flash green to restore focus
  thumb.classList.remove('nav-flash-green');
  void thumb.offsetWidth;
  thumb.classList.add('nav-flash-green');
  thumb.addEventListener('animationend', () => thumb.classList.remove('nav-flash-green'), { once: true });

  // Hide return button and clear reference
  _setReturnBtn(tradeId, false);
  _navRef = null;
}

function _setReturnBtn(tradeId, visible) {
  const btn = document.getElementById('ctx-ret-' + tradeId);
  if (btn) btn.classList.toggle('visible', visible);
}

/* ── INIT ────────────────────────────────────────────────────── */
window.onload = async function() {
  try {
    await openIDB();
    await idbLoadAll();
  } catch(e) {
    console.warn('IndexedDB no disponible, las fotos no persistirán entre sesiones:', e);
  }
  loadData();
  loadFondeoData();
  renderStats();
  initEditorUI();
};
</script>

══════════════════════════════════════════════════════════ */

  'use strict';

  var iconSVG =
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">' +
      '<rect width="512" height="512" rx="80" fill="#0a0f0d"/>' +
      /* grid lines */

      '<line x1="80" y1="192" x2="432" y2="192" stroke="#1d4228" stroke-width="2"/>' +
      /* bearish candle */
      '<rect x="96"  y="208" width="56" height="96"  fill="#c94b5a" rx="4"/>' +
      '<rect x="118" y="168" width="12" height="40"  fill="#c94b5a"/>' +
      '<rect x="118" y="304" width="12" height="48"  fill="#c94b5a"/>' +
      /* bullish candle 1 */
      '<rect x="216" y="240" width="56" height="120" fill="#4ecb82" rx="4"/>' +
      '<rect x="238" y="192" width="12" height="48"  fill="#4ecb82"/>' +
      '<rect x="238" y="360" width="12" height="32"  fill="#4ecb82"/>' +
      /* bullish candle 2 */
      '<rect x="336" y="176" width="56" height="144" fill="#4ecb82" rx="4"/>' +
      '<rect x="358" y="128" width="12" height="48"  fill="#4ecb82"/>' +
      '<rect x="358" y="320" width="12" height="48"  fill="#4ecb82"/>' +
      /* golden trend line */
      '<polyline points="80,352 176,288 296,240 432,192"' +
        ' fill="none" stroke="#c9a84c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>' +
    '</svg>';

  var iconDataURI = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(iconSVG)));

  /* ── Set apple-touch-icon ── */
  document.getElementById('pwa-apple-icon').setAttribute('href', iconDataURI);

  /* ── Inject Web App Manifest via Blob URL ── */
  var manifest = {
    name:             'Trading Journal',
    short_name:       'TradingJournal',
    description:      'Journal personal de trading de Benja',
    start_url:        '.',
    display:          'standalone',
    background_color: '#0a0f0d',
    theme_color:      '#00e676',
    orientation:      'portrait-primary',
    icons: [
      { src: iconDataURI, sizes: '192x192', type: 'image/svg+xml', purpose: 'any' },
      { src: iconDataURI, sizes: '512x512', type: 'image/svg+xml', purpose: 'maskable' }
    ]
  };

  var manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  document.getElementById('pwa-manifest').setAttribute('href', URL.createObjectURL(manifestBlob));

  /* ── Register Service Worker (caches this page for instant offline boot) ── */
  if ('serviceWorker' in navigator) {
    var pageURL = location.href;
    var swSource =
      'var CACHE="tj-sw-v1";' +
      'var PAGE="' + pageURL.replace(/"/g, '\\"') + '";' +
      'self.addEventListener("install",function(e){' +
        'e.waitUntil(caches.open(CACHE).then(function(c){return c.add(PAGE)}).then(function(){return self.skipWaiting()}));' +
      '});' +
      'self.addEventListener("activate",function(e){' +
        'e.waitUntil(caches.keys().then(function(keys){' +
          'return Promise.all(keys.filter(function(k){return k!==CACHE}).map(function(k){return caches.delete(k)}));' +
        '}).then(function(){return self.clients.claim()}));' +
      '});' +
      'self.addEventListener("fetch",function(e){' +
        'if(e.request.mode==="navigate"){' +
          'e.respondWith(caches.match(PAGE).then(function(r){return r||fetch(e.request)}));' +
        '}' +
      '});';

    var swBlob = new Blob([swSource], { type: 'application/javascript' });
    navigator.serviceWorker
      .register(URL.createObjectURL(swBlob), { scope: './' })
      .then(function (reg) { console.log('[PWA] SW registered, scope:', reg.scope); })
      .catch(function (err) { console.warn('[PWA] SW unavailable in this context:', err.message); });
  }
